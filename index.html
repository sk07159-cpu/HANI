<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hani's Choice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { border-bottom: 3px solid #b45309; color: #b45309 !important; } 
        .selected-btn { background-color: #27272a !important; color: #ffffff !important; border-color: #27272a !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #b45309;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-zinc-800">

    <div id="loading-screen" class="fixed inset-0 bg-stone-50 z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader mb-4"></div>
        <p class="text-zinc-500 font-bold tracking-widest text-sm">LOADING...</p>
    </div>
    
    <div id="error-box" class="bg-red-100 text-red-700 text-center p-3 font-bold hidden"></div>

    <header class="bg-white shadow-sm sticky top-0 z-50 p-5 text-center border-b border-stone-200">
        <h1 class="text-2xl font-black text-zinc-900 uppercase tracking-widest">✨ Hani's Choice</h1>
        <div id="country-tabs" class="flex justify-center gap-6 mt-4 overflow-x-auto no-scrollbar pt-1"></div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        <div id="region-buttons" class="flex flex-wrap gap-2 justify-center mb-6 pt-3"></div>
        
        <div id="welcome-section" class="text-center mt-6 mb-10 px-2 transition-all duration-500">
            <div class="relative w-full h-64 md:h-80 rounded-3xl overflow-hidden shadow-lg mb-6 border border-stone-200">
                <img id="welcome-img" src="https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Welcome" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center">
                    <h2 id="welcome-title" class="text-3xl font-black text-white tracking-widest uppercase drop-shadow-lg shadow-black">THAILAND</h2>
                </div>
            </div>
            <p class="text-stone-500 font-medium tracking-wide text-sm bg-stone-100 py-3 rounded-xl border border-stone-200">
                <i class="fa-solid fa-hand-pointer mr-2 text-amber-600"></i>
                Please select a region above to explore first.
            </p>
        </div>

        <div id="category-buttons" class="hidden flex flex-wrap justify-center gap-3 mb-8">
            <button onclick="selectCategory('Restaurant', this)" class="cat-btn bg-white border border-stone-300 text-stone-600 px-6 py-2 rounded-full text-sm font-semibold shadow-sm transition hover:border-zinc-800">🍽️ Food</button>
            <button onclick="selectCategory('Cafe & Bar', this)" class="cat-btn bg-white border border-stone-300 text-stone-600 px-6 py-2 rounded-full text-sm font-semibold shadow-sm transition hover:border-zinc-800">☕ Cafe/Bar</button>
            <button onclick="selectCategory('Hotel', this)" class="cat-btn bg-white border border-stone-300 text-stone-600 px-6 py-2 rounded-full text-sm font-semibold shadow-sm transition hover:border-zinc-800">🏨 Hotel</button>
            <button onclick="selectCategory('Service', this)" class="cat-btn bg-white border border-stone-300 text-stone-600 px-6 py-2 rounded-full text-sm font-semibold shadow-sm transition hover:border-zinc-800">💆 Massage</button>
        </div>
        
        <div id="place-list" class="bg-white rounded-2xl shadow-md border border-stone-100 divide-y divide-stone-100 overflow-hidden text-left hidden"></div>
        
        <div class="text-center mt-10 mb-10">
            <button id="load-more-btn" onclick="loadMore()" class="hidden bg-zinc-900 text-amber-500 border border-zinc-900 px-10 py-3 rounded-full font-bold hover:bg-zinc-800 transition tracking-wide shadow-lg">Show More</button>
        </div>
    </main>

    <script>
        var allData = [];
        var filteredList = [];
        var currentCountry = "";
        var currentRegion = "";
        var visibleCount = 10;
        
        // 최신 API URL 유지
        var API_URL = "https://script.google.com/macros/s/AKfycbwxFNRXfT3FnJRSWNvW0YEpCooQkFUawwFtw0dMWk7HDitWEpwfDusrpJz_T7feA-o/exec"; 

        function showError(msg) {
            var box = document.getElementById('error-box');
            box.innerText = "Error: " + msg;
            box.classList.remove('hidden');
        }

        // 구글 사진 우회 로직 유지
        function getImageUrl(url) {
            if (!url || !url.toString().includes('drive.google.com')) return 'https://via.placeholder.com/150?text=No+Image';
            var fileId = url.split('/d/')[1];
            if(fileId) fileId = fileId.split('/')[0];
            return fileId ? "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w1000" : url;
        }

        function renderStars(rating) {
            var score = parseFloat(rating) || 0;
            var stars = '';
            for (var i = 1; i <= 5; i++) {
                if (i <= Math.floor(score)) stars += '<i class="fa-solid fa-star text-amber-500 text-[10px]"></i>';
                else if (i - 0.5 <= score) stars += '<i class="fa-solid fa-star-half-stroke text-amber-500 text-[10px]"></i>';
                else stars += '<i class="fa-regular fa-star text-stone-300 text-[10px]"></i>';
            }
            return '<span class="text-sm font-bold text-zinc-800 mr-1">' + score.toFixed(1) + '</span>' + stars;
        }

        async function init() {
            try {
                var res = await fetch(API_URL);
                if (!res.ok) throw new Error("Network Error");
                var textData = await res.text();
                allData = JSON.parse(textData);
                if(allData.error) throw new Error(allData.error);
                
                renderCountries();
                
                setTimeout(function() {
                    var loadingScreen = document.getElementById('loading-screen');
                    loadingScreen.style.opacity = '0';
                    setTimeout(function() { loadingScreen.style.display = 'none'; }, 500);
                }, 300);

            } catch (e) { 
                document.getElementById('loading-screen').style.display = 'none';
                showError("데이터를 불러오지 못했습니다. URL을 확인해주세요.");
                console.error(e);
            }
        }

        function renderCountries() {
            var countries = [];
            allData.forEach(function(d) {
                if(d.Country && countries.indexOf(d.Country) === -1) countries.push(d.Country);
            });
            if(countries.length === 0) return;
            
            var container = document.getElementById('country-tabs');
            var htmlStr = "";
            countries.forEach(function(c) {
                htmlStr += '<button onclick="selectCountry(\'' + c + '\', this)" class="country-tab px-3 py-2 font-bold text-stone-400 text-sm transition hover:text-zinc-800">' + c + '</button>';
            });
            container.innerHTML = htmlStr;
            document.querySelector('.country-tab').click();
        }

        function selectCountry(country, btn) {
            currentCountry = country;
            document.querySelectorAll('.country-tab').forEach(function(b) { b.classList.remove('active-tab'); });
            btn.classList.add('active-tab');
            
            document.getElementById('welcome-title').innerText = country.toUpperCase();
            var welcomeImg = document.getElementById('welcome-img');
            
            var countryName = country.toLowerCase();
            if(countryName === 'thailand') {
                welcomeImg.src = 'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80';
            } else if (countryName.includes('hong')) {
                // 홍콩 야경 사진 유지
                welcomeImg.src = 'https://images.unsplash.com/photo-1536599018102-9f803c140fc1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80';
            } else {
                welcomeImg.src = 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80';
            }
            
            var regions = [];
            allData.forEach(function(d) {
                if(d.Country === country && d.Region && regions.indexOf(d.Region) === -1) regions.push(d.Region);
            });
            
            var htmlStr = "";
            regions.forEach(function(r) {
                htmlStr += '<button onclick="selectRegion(\'' + r + '\', this)" class="reg-btn bg-white border border-stone-200 text-zinc-700 px-5 py-2 rounded-xl text-sm font-semibold transition hover:bg-stone-100 shadow-sm">' + r + '</button>';
            });
            document.getElementById('region-buttons').innerHTML = htmlStr;
            
            document.getElementById('welcome-section').classList.remove('hidden');
            document.getElementById('category-buttons').classList.add('hidden');
            document.getElementById('place-list').classList.add('hidden');
            document.getElementById('load-more-btn').classList.add('hidden');
        }

        function selectRegion(region, btn) {
            currentRegion = region;
            document.querySelectorAll('.reg-btn').forEach(function(b) { b.classList.remove('selected-btn'); });
            btn.classList.add('selected-btn');
            
            document.getElementById('welcome-section').classList.add('hidden');
            document.getElementById('category-buttons').classList.remove('hidden');
            document.getElementById('place-list').classList.remove('hidden');
            
            document.querySelector('.cat-btn').click();
        }

        function selectCategory(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('selected-btn'); });
            btn.classList.add('selected-btn');
            
            filteredList = allData.filter(function(d) {
                return d.Country === currentCountry && d.Region === currentRegion && d.Category && d.Category.toString().trim() === cat;
            }).sort(function(a, b) {
                return (parseFloat(b.Rating) || 0) - (parseFloat(a.Rating) || 0);
            });
            
            visibleCount = 10;
            renderItems();
        }

        function renderItems() {
            var container = document.getElementById('place-list');
            var items = filteredList.slice(0, visibleCount);
            
            if(items.length === 0) {
                container.innerHTML = "<p class='p-10 text-center text-stone-400'>No results found.</p>";
                document.getElementById('load-more-btn').classList.add('hidden');
                return;
            }

            var htmlStr = "";
            items.forEach(function(item) {
                var name = item.Name || 'No Name';
                var subCat = item.SubCategory || '';
                var addr = item.Address || '';
                var review = item.Review || '';
                var photo = getImageUrl(item.Photo1);
                var ratingHtml = renderStars(item.Rating);

                htmlStr += '<div onclick="openDetail(\'' + name.replace(/'/g, "\\'") + '\')" class="flex items-center p-5 gap-4 hover:bg-stone-50 cursor-pointer transition">' +
                    '<div class="flex-1 min-w-0">' +
                        '<h3 class="text-lg font-bold text-zinc-900 truncate">' + name + '</h3>' +
                        '<div class="my-1">' + ratingHtml + ' <span class="text-xs text-stone-400 ml-2">· ' + subCat + '</span></div>' +
                        '<p class="text-xs text-stone-500 truncate">' + addr + '</p>' +
                        '<p class="text-xs text-amber-700 mt-2 italic font-medium truncate">"' + review + '"</p>' +
                    '</div>' +
                    '<img src="' + photo + '" class="w-24 h-24 object-cover rounded-xl border border-stone-200 shadow-sm">' +
                '</div>';
            });
            container.innerHTML = htmlStr;
            
            if(filteredList.length <= visibleCount) {
                document.getElementById('load-more-btn').classList.add('hidden');
            } else {
                document.getElementById('load-more-btn').classList.remove('hidden');
            }
        }

        function loadMore() { 
            visibleCount += 10; 
            renderItems(); 
        }

        function openDetail(name) {
            var item = null;
            for(var i=0; i<allData.length; i++) {
                if(allData[i].Name === name) {
                    item = allData[i];
                    break;
                }
            }
            if(!item) return;

            var nameStr = item.Name || '';
            var subCatStr = item.SubCategory || '';
            var addrStr = item.Address || '-';
            var featStr = item.Features || '-';
            var phoneStr = item.Phone || '-';
            var reviewStr = item.Review || '';
            var mapStr = item.Map_Link || '#';

            // 모바일 최적화 메타태그 및 레이아웃 유지
            var detailHtml = '<html><head>' +
                '<meta name="viewport" content="width=device-width, initial-scale=1.0">' + 
                '<script src="https://cdn.tailwindcss.com"><\/script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></head>' +
                '<body class="bg-stone-100 font-sans text-left">' + 
                    '<div class="w-full mx-auto bg-white overflow-hidden min-h-screen border border-stone-200">' + 
                        '<div class="grid grid-cols-2 gap-0.5 bg-stone-200">' +
                            '<img src="' + getImageUrl(item.Photo1) + '" class="w-full h-48 object-cover">' +
                            '<img src="' + getImageUrl(item.Photo2) + '" class="w-full h-48 object-cover">' +
                            '<img src="' + getImageUrl(item.Photo3) + '" class="w-full h-48 object-cover">' +
                            '<img src="' + getImageUrl(item.Photo4) + '" class="w-full h-48 object-cover">' +
                        '</div>' +
                        '<div class="p-6">' + 
                            '<h1 class="text-3xl font-black mb-2 text-zinc-900 leading-tight">' + nameStr + '</h1>' +
                            '<div class="mb-8 flex items-center gap-1 flex-wrap">' + 
                                renderStars(item.Rating) + 
                                ' <span class="text-stone-300 mx-2">|</span> ' +
                                '<span class="text-stone-500 text-sm font-medium bg-stone-100 px-2 py-1 rounded">' + subCatStr + '</span>' +
                            '</div>' +
                            '<div class="space-y-5 text-sm text-zinc-600 border-t border-stone-100 pt-6">' +
                                '<p class="flex items-start gap-3"><i class="fa-solid fa-location-dot mt-1 text-amber-600 flex-shrink-0"></i> <span>' + addrStr + '</span></p>' +
                                '<p class="flex items-start gap-3"><i class="fa-solid fa-tag mt-1 text-amber-600 flex-shrink-0"></i> <span>' + featStr + '</span></p>' +
                                '<p class="flex items-start gap-3"><i class="fa-solid fa-phone mt-1 text-amber-600 flex-shrink-0"></i> <span>' + phoneStr + '</span></p>' +
                                '<div class="bg-stone-50 p-5 rounded-2xl text-zinc-800 italic border border-stone-100 mt-4 leading-relaxed text-sm">"' + reviewStr + '"</div>' +
                            '</div>' +
                            '<a href="' + mapStr + '" target="_blank" class="block w-full text-center bg-zinc-900 text-amber-500 py-4 rounded-full font-bold mt-10 shadow-lg transition hover:bg-zinc-800 tracking-wide border border-zinc-800 text-lg">Open Google Maps</a>' +
                        '</div>' +
                    '</div>' +
                '</body></html>';
                
            var win = window.open("", "_blank", "width=480,height=850");
            win.document.write(detailHtml);
            win.document.close();
        }
        
        init();
    </script>
</body>
</html>
